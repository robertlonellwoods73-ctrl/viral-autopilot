
```yaml
services:
  - name: viral-autopilot-backend
    type: web
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: viral-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: AGNES_API_KEY
        sync: false

  - name: viral-autopilot-worker
    type: worker
    env: node
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: viral-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: AGNES_API_KEY
        sync: false

databases:
  - name: viral-db
    plan: free
```
